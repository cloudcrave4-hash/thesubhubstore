[build]
publish = "."

[functions]
directory = "netlify/functions"

[[headers]]
for = "/*"

[headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://formsubmit.co https://*.supabase.co https://rfnfjuwuzihjxgamnyou.supabase.co https://cdn.jsdelivr.net; img-src 'self' data: blob: https://*.supabase.co https://rfnfjuwuzihjxgamnyou.supabase.co; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self' https://formsubmit.co; frame-src 'self' https://formsubmit.co; frame-ancestors 'none'; upgrade-insecure-requests"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
